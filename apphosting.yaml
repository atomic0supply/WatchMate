# Firebase App Hosting backend config.
# Docs: https://firebase.google.com/docs/app-hosting/configure
runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 1
  concurrency: 80

# Env vars are managed in the Firebase Console (App Hosting → backend →
# Configuración → Entorno). Console-defined vars are available at both
# BUILD and RUNTIME by default.
#
#   - VITE_TMDB_API_KEY  -> client TMDB key (gets embedded in the JS bundle)
#
# The Gemini API key is NOT here: it lives in Secret Manager and is
# consumed by Cloud Functions (see functions/src/index.ts), not the SPA.
